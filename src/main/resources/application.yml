spring:
  application:
    name: ai-gateway
  codec:
    max-in-memory-size: 2MB

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

gateway:
  api-keys: ${GATEWAY_API_KEYS:gateway-dev-key}
  requests-per-minute: ${GATEWAY_REQUESTS_PER_MINUTE:60}
  upstream-timeout: ${GATEWAY_UPSTREAM_TIMEOUT:60s}
  providers:
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model-mapping:
        smart-chat: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      model-mapping:
        smart-chat: ${OPENAI_MODEL:gpt-4o-mini}
    compatible:
      base-url: ${COMPATIBLE_BASE_URL:http://localhost:11434/v1}
      api-key: ${COMPATIBLE_API_KEY:local-development-key}
      model-mapping:
        smart-chat: ${COMPATIBLE_MODEL:qwen2.5:7b}
  routes:
    smart-chat:
      - deepseek
      - openai
      - compatible

logging:
  pattern:
    level: "%5p [requestId=%X{x-request-id:-}]"
