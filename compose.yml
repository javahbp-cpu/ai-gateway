services:
  gateway:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.4.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - "./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_healthy
